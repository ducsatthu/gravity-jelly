<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: #E9DAC0; display: flex; justify-content: center; padding: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>
  <script type="text/babel" src="phone-frame.jsx"></script>
  <script type="text/babel" src="board.jsx"></script>
  <script type="text/babel" src="board-design.jsx"></script>
  <script type="text/babel">
    const NS = window.GravityJellyDesignSystem_3e0487;
    const { ObjectiveBar } = NS;
    const PhoneFrame = window.GJPhoneFrame, P = window.GJBoardParts;
    const BG = '../06-svg-assets/backgrounds/meadow-bg.png';

    // The GAME screen with the objective cluster slotted under the HUD.
    function GameWithObjective({ goal }) {
      const map = ['.........','.........','....PP...','....PP...','...M..BB.','.YYM.SBB.','.YYMMSB..','BYYMMSPPP','BBYMMSPPP'];
      const pieces = [
        { cells: [[0,0],[1,0],[1,1]], color: 'mint' },
        { cells: [[0,0],[0,1],[0,2]], color: 'pink' },
        { cells: [[0,0],[0,1],[1,0],[1,1]], color: 'blue' },
      ];
      return (
        <div style={{ position:'relative', width:'100%', height:'100%', overflow:'hidden', fontFamily:'var(--font-body)' }}>
          <img src={BG} alt="" aria-hidden="true" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center bottom' }} />
          <div style={{ position:'relative', zIndex:1, height:'100%', display:'flex', flexDirection:'column', padding:'12px 12px 16px', boxSizing:'border-box' }}>
            {/* HUD 56dp: score · gravity · pause */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:6 }}>
              <P.ScoreCard score={2340} />
              <P.GravityPad active="up" />
              <P.PauseCard />
            </div>
            {/* objective cluster — directly under the HUD */}
            <div style={{ marginTop:10 }}>
              <ObjectiveBar goal={goal} rotations={9} />
            </div>
            {/* board */}
            <div style={{ flex:'0 0 auto', display:'flex', justifyContent:'center', marginTop:12 }}>
              <P.BoardPanel board={map} direction="down" />
            </div>
            {/* tray + refresh */}
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:12 }}>
              <P.TrayDock pieces={pieces} />
              <P.RefreshFab />
            </div>
            <div style={{ flex:1, minHeight:6 }}></div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <PhoneFrame statusBar={false}>
        <GameWithObjective goal={{ kind:'mixed', targets:{ target:'drop', total:4, remaining:3, buried:1 }, score:{ score:2340, target:5000 } }} />
      </PhoneFrame>
    );
  </script>
</body>
</html>
