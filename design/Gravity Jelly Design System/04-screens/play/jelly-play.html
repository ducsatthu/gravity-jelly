<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gravity Jelly — Chơi thử</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(120% 90% at 50% 0%, #F0E2C8 0%, #E4D2B2 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; box-sizing: border-box; font-family: var(--font-body); overflow: hidden; }
  #scaler { transform-origin: center center; }
  #root { display: flex; }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="../phone-frame.jsx"></script>
  <script type="text/babel" src="jelly-play.jsx"></script>
  <script type="text/babel">
    const PhoneFrame = window.GJPhoneFrame, Play = window.GJPlay;
    ReactDOM.createRoot(document.getElementById('root')).render(
      <PhoneFrame><Play /></PhoneFrame>
    );
    const fit = () => {
      const s = Math.min(1, (window.innerHeight - 24) / 780, (window.innerWidth - 24) / 360);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    };
    window.addEventListener('resize', fit); fit();
  </script>
</body>
</html>
