<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: radial-gradient(120% 90% at 50% 0%, #FFF7EC 0%, #F3E3CC 100%); display: flex; justify-content: center; padding: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../_ds_bundle.js"></script>
  <script type="text/babel" src="phone-frame.jsx"></script>
  <script type="text/babel" src="screen-extras.jsx"></script>
  <script type="text/babel" src="splash-screen.jsx"></script>
  <script type="text/babel">
    const PhoneFrame = window.GJPhoneFrame;
    const S=window.GJSplashScreen;
    function Demo(){const [p,setP]=React.useState(0.12);React.useEffect(()=>{const id=setInterval(()=>setP(v=>v>=1?0.12:Math.min(1,v+0.06)),420);return()=>clearInterval(id);},[]);return <PhoneFrame statusBar={false}><S progress={p}/></PhoneFrame>;}
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
