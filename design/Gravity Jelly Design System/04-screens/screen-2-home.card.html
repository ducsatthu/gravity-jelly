<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: radial-gradient(120% 90% at 50% 0%, #FFF7EC 0%, #F3E3CC 100%); display: flex; justify-content: center; padding: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="phone-frame.jsx"></script>
  <script type="text/babel" src="home-screen.jsx"></script>
  <script type="text/babel">
    const PhoneFrame = window.GJPhoneFrame, Home = window.GJHomeScreen;
    const { useTweaks, TweaksPanel, TweakSection, TweakToggle } = window;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "petals": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <PhoneFrame>
            <Home
              petals={t.petals}
              onCampaign={()=>{}} onPlay={()=>{}} onGuide={()=>{}} onTools={()=>{}}
            />
          </PhoneFrame>
          <TweaksPanel>
            <TweakSection label="Hiệu ứng" />
            <TweakToggle label="Cánh hoa bay" value={t.petals}
              onChange={(v) => setTweak('petals', v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
