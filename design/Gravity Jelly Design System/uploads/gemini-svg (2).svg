<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="125%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#7da2a9" flood-opacity="0.15"></feDropShadow>
    </filter>

    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#f0f7f4"></stop>
    </linearGradient>

    <linearGradient id="board-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffcf7"></stop>
      <stop offset="100%" stop-color="#f5ede0"></stop>
    </linearGradient>
    
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfbf7"></stop>
      <stop offset="100%" stop-color="#e3d3be"></stop>
    </linearGradient>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="50" width="360" height="260" rx="45" ry="45" fill="url(#border-grad)"></rect>
    <rect x="78" y="58" width="344" height="244" rx="38" ry="38" fill="url(#board-grad)"></rect>
    
    <path d="M 120 66 Q 94 68 92 100" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"></path>

    <path d="M 40 310 C 40 250, 110 240, 140 260 C 170 230, 260 220, 290 260 C 330 230, 420 240, 440 290 C 460 310, 450 330, 430 330 L 70 330 Z" fill="#e7f3f5" opacity="0.5"></path>
    
    <path d="M 50 310 &#xA;             C 40 265, 100 250, 130 270 &#xA;             C 160 240, 230 245, 260 275 &#xA;             C 290 240, 370 240, 400 280 &#xA;             C 430 260, 460 285, 450 320 &#xA;             C 430 340, 70 340, 50 310 Z" fill="url(#cloud-grad)"></path>

    <path d="M 45 135 Q 60 90, 115 65" fill="none" stroke="#d5b075" stroke-width="10" stroke-linecap="round"></path>
    <path d="M 70 100 Q 55 85, 50 88" fill="none" stroke="#d5b075" stroke-width="6" stroke-linecap="round"></path>

    <path d="M 50 88 C 40 75, 60 65, 65 75 C 70 85, 55 95, 50 88 Z" fill="#c3dbb4"></path>
    <path d="M 115 65 C 130 55, 135 75, 125 80 C 110 85, 110 70, 115 65 Z" fill="#bddead"></path>

    <g transform="translate(100, 70)">
      <circle cx="0" cy="-15" r="13" fill="#ffffff"></circle>
      <circle cx="14" cy="-5" r="13" fill="#ffffff"></circle>
      <circle cx="9" cy="12" r="13" fill="#ffffff"></circle>
      <circle cx="-9" cy="12" r="13" fill="#ffffff"></circle>
      <circle cx="-14" cy="-5" r="13" fill="#ffffff"></circle>
      <circle cx="0" cy="0" r="11" fill="#fcd366"></circle>
      <circle cx="-2" cy="-2" r="3" fill="#ffea9f" opacity="0.6"></circle> </g>
  </g>
</svg>