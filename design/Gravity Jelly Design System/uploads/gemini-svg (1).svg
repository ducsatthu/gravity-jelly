<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <filter id="board-shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#5c6b4e" flood-opacity="0.12"></feDropShadow>
    </filter>

    <linearGradient id="outer-border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbf4"></stop>
      <stop offset="100%" stop-color="#f2e3d0"></stop>
    </linearGradient>

    <linearGradient id="inner-bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf9f2"></stop>
      <stop offset="100%" stop-color="#faf2e5"></stop>
    </linearGradient>

    <linearGradient id="inner-edge-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eddcc6"></stop>
      <stop offset="100%" stop-color="#ffffff" opacity="0.8"></stop>
    </linearGradient>
  </defs>

  <rect x="30" y="30" width="740" height="740" rx="80" ry="80" fill="url(#outer-border-grad)" filter="url(#board-shadow)"></rect>

  <rect x="42" y="42" width="716" height="716" rx="68" ry="68" fill="url(#inner-edge-grad)" opacity="0.7"></rect>

  <rect x="45" y="45" width="710" height="710" rx="65" ry="65" fill="url(#inner-bg-grad)"></rect>

  <path d="M 120 58 Q 70 62 62 120" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.5"></path>
</svg>