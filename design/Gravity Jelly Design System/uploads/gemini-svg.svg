<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#5c6b4e" flood-opacity="0.15"></feDropShadow>
    </filter>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfbf7"></stop>
      <stop offset="100%" stop-color="#e2cfb7"></stop>
    </linearGradient>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf4e9"></stop>
      <stop offset="100%" stop-color="#f9efe0"></stop>
    </linearGradient>
  </defs>

  <rect x="15" y="15" width="770" height="260" rx="55" ry="55" fill="url(#border-grad)" filter="url(#shadow)"></rect>

  <rect x="25" y="25" width="750" height="240" rx="45" ry="45" fill="url(#bg-grad)"></rect>

  <path d="M 65 33 Q 40 35 37 60" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"></path>

  <line x1="275" y1="55" x2="275" y2="235" stroke="#e6dac9" stroke-width="3" stroke-linecap="round"></line>
  <line x1="525" y1="55" x2="525" y2="235" stroke="#e6dac9" stroke-width="3" stroke-linecap="round"></line>
</svg>