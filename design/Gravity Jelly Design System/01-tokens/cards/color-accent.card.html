<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Semantic" subtitle="Primary, gravity, success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-bg); font-family: var(--font-body); color: var(--color-text); padding: 22px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 12px; margin-top: 8px; }
  .hex { font-size: 11px; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-primary);box-shadow:0 4px 0 var(--color-primary-edge)"></div><div class="name">primary</div><div class="hex">#FF9F68</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-gravity);box-shadow:0 4px 0 var(--color-gravity-edge)"></div><div class="name">gravity</div><div class="hex">#7E6CF0</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-success)"></div><div class="name">success</div><div class="hex">#6FCF7F</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-warning)"></div><div class="name">warning</div><div class="hex">#FFCA66</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-danger)"></div><div class="name">danger</div><div class="hex">#F08A7E</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-info)"></div><div class="name">info</div><div class="hex">#8FB6F2</div></div>
  </div>
</body>
</html>
