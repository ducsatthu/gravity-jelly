<!-- @dsCard group="Colors" viewport="700x150" name="Jelly Block Colors" subtitle="4 signature fills · fill / edge / shine" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-bg); font-family: var(--font-body); color: var(--color-text); padding: 22px; }
  .row { display: flex; gap: 18px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-lg); display: flex; align-items: flex-start; justify-content: flex-end; }
  .edges { display: flex; gap: 4px; margin-top: 8px; }
  .e { width: 22px; height: 14px; border-radius: 4px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; margin-top: 8px; }
  .hex { font-size: 11px; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:var(--color-block-yellow);border:3px solid var(--color-block-yellow-edge)"></div>
      <div class="edges"><div class="e" style="background:var(--color-block-yellow-edge)"></div><div class="e" style="background:var(--color-block-yellow-shine)"></div></div>
      <div class="name">block-yellow</div><div class="hex">#FFE3A3</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--color-block-mint);border:3px solid var(--color-block-mint-edge)"></div>
      <div class="edges"><div class="e" style="background:var(--color-block-mint-edge)"></div><div class="e" style="background:var(--color-block-mint-shine)"></div></div>
      <div class="name">block-mint</div><div class="hex">#A3E5D9</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--color-block-pink);border:3px solid var(--color-block-pink-edge)"></div>
      <div class="edges"><div class="e" style="background:var(--color-block-pink-edge)"></div><div class="e" style="background:var(--color-block-pink-shine)"></div></div>
      <div class="name">block-pink</div><div class="hex">#F7A9C0</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--color-block-blue);border:3px solid var(--color-block-blue-edge)"></div>
      <div class="edges"><div class="e" style="background:var(--color-block-blue-edge)"></div><div class="e" style="background:var(--color-block-blue-shine)"></div></div>
      <div class="name">block-blue</div><div class="hex">#B3C7F7</div>
    </div>
  </div>
</body>
</html>
