<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="display → caption + on-block number" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-display); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1.5px solid var(--color-cell-line); }
  .lbl { font-family: var(--font-body); font-size: 11px; font-weight: 700; color: var(--color-text-muted); width: 130px; flex-shrink: 0; }
  .s { font-weight: 700; }
</style>
</head>
<body>
  <div class="r"><span class="lbl">text/display · 40</span><span class="s" style="font-size:var(--text-display)">Aa</span></div>
  <div class="r"><span class="lbl">text/title · 28</span><span class="s" style="font-size:var(--text-title)">Aa Tiêu đề</span></div>
  <div class="r"><span class="lbl">text/heading · 22</span><span class="s" style="font-size:var(--text-heading)">Aa Heading</span></div>
  <div class="r"><span class="lbl">text/score · 20</span><span class="s" style="font-size:var(--text-score)">12.480</span></div>
  <div class="r"><span class="lbl">text/body · 16</span><span class="s" style="font-size:var(--text-body);font-family:var(--font-body)">Văn bản giao diện</span></div>
  <div class="r"><span class="lbl">text/label · 14</span><span class="s" style="font-size:var(--text-label);font-family:var(--font-body)">Nhãn nút bấm</span></div>
  <div class="r"><span class="lbl">text/caption · 12</span><span class="s" style="font-size:var(--text-caption);font-family:var(--font-body)">Chú thích phụ</span></div>
</body>
</html>
