<!-- @dsCard group="Colors" viewport="700x140" name="Surfaces & Cells" subtitle="Background, surface, sunken, stone, empty cell" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-surface); font-family: var(--font-body); color: var(--color-text); padding: 22px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); box-shadow: inset 0 0 0 1px var(--color-cell-line); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 12px; margin-top: 8px; }
  .hex { font-size: 11px; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-bg)"></div><div class="name">bg</div><div class="hex">#FFF7EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface)"></div><div class="name">surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-sunken)"></div><div class="name">surface-sunken</div><div class="hex">#F4E9D8</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-cell-empty)"></div><div class="name">cell-empty</div><div class="hex">#FBEFDD</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-stone);border:3px solid var(--color-stone-edge)"></div><div class="name">stone</div><div class="hex">#C9BCA8</div></div>
  </div>
</body>
</html>
