<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="button-shadow" x="-20%" y="-20%" width="140%" height="145%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#8ba295" flood-opacity="0.2"></feDropShadow>
    </filter>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffcf7"></stop>
      <stop offset="100%" stop-color="#e3d4bf"></stop>
    </linearGradient>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#fffaf0"></stop>
    </linearGradient>
  </defs>

  <g filter="url(#button-shadow)">
    <rect x="20" y="20" width="160" height="160" rx="45" ry="45" fill="url(#border-grad)"></rect>
    
    <rect x="25" y="25" width="150" height="150" rx="38" ry="38" fill="url(#bg-grad)"></rect>

    <path d="M 45 33 Q 34 34 33 45" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"></path>
  </g>
</svg>