<!-- @dsCard group="Assets" viewport="760x920" name="PNG Backgrounds" subtitle="Ảnh nền raster cho màn chơi — full-bleed, dùng object-fit: cover canh đáy." -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); padding: 24px; }
  h2 { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin: 0 0 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-muted); }
  section { margin-bottom: 28px; }
  .bgs { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .bgs figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .frame { width: 240px; height: 430px; border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-md); background: var(--color-surface-sunken); }
  .frame img { width: 100%; height: 100%; object-fit: cover; object-position: center bottom; display: block; }
  cap { display: block; font-size: 11px; font-weight: 700; color: var(--color-text-muted); letter-spacing: .03em; }
  .note { font-size: 12px; font-weight: 600; color: var(--color-text-muted); line-height: 1.5; max-width: 660px; }
  code { font-family: ui-monospace, monospace; background: var(--color-surface-sunken); padding: 1px 5px; border-radius: 5px; font-size: 11px; }
</style>
</head>
<body>
  <section>
    <h2>Nền màn chơi · raster</h2>
    <div class="bgs">
      <figure>
        <div class="frame"><img src="backgrounds/meadow-bg.png" alt="meadow background" /></div>
        <cap>meadow-bg · W1 Đồng cỏ (768×1376)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/forest-bg.png" alt="forest in-game background" /></div>
        <cap>forest-bg · W2 Rừng rậm (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/waterfall-bg.png" alt="waterfall in-game background" /></div>
        <cap>waterfall-bg · W3 Sông &amp; Thác (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/desert-bg.png" alt="desert in-game background" /></div>
        <cap>desert-bg · W4 Sa mạc (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/home-world-1-bg.png" alt="home world 1 background" /></div>
        <cap>home-world-1-bg · Home World 1 (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/home-world-2-bg.png" alt="home world 2 background" /></div>
        <cap>home-world-2-bg · Home World 2 Rừng rậm (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/home-world-3-bg.png" alt="home world 3 background" /></div>
        <cap>home-world-3-bg · Home World 3 Sông & Thác (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/home-world-4-bg.png" alt="home world 4 background" /></div>
        <cap>home-world-4-bg · Home World 4 Sa mạc (821×1916)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/world1-map-bg.png" alt="world 1 level-map background" /></div>
        <cap>world1-map-bg · Level Map W1 (724×2172, 1:3)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/world2-map-bg-v3.png" alt="world 2 level-map background" /></div>
        <cap>world2-map-bg-v3 · Level Map W2 Rừng rậm (665×2365)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/world3-map-bg.png" alt="world 3 level-map background" /></div>
        <cap>world3-map-bg · Level Map W3 Sông &amp; Thác</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/world4-map-bg.png" alt="world 4 level-map background" /></div>
        <cap>world4-map-bg · Level Map W4 Sa mạc (724×2172, 1:3)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/leaderboard-podium-bg.png" alt="leaderboard podium background" style="object-position: center top;" /></div>
        <cap>leaderboard-podium-bg · Bảng xếp hạng (941×2091, canh đỉnh)</cap>
      </figure>
      <figure>
        <div class="frame"><img src="backgrounds/cam-nang-bg.png" alt="cẩm nang background" style="object-position: center top;" /></div>
        <cap>cam-nang-bg · Cẩm nang (821×1916, canh đỉnh)</cap>
      </figure>
    </div>
  </section>

  <p class="note">PNG full-bleed cho nền màn chơi. Đặt phủ kín khung máy với <code>object-fit: cover</code> và <code>object-position: center bottom</code> để giữ tiền cảnh (hoa, nấm) ở đáy. HUD, board và khay xếp chồng lên trên.</p>
</body>
</html>
