<!-- @dsCard group="Components" viewport="780x1280" name="Tray" subtitle="112dp dock · uniform cell sizing · full piece catalog (6 nhóm)" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--color-bg); font-family: var(--font-body); color: var(--color-text); padding: 22px; }
  .wrap { display: flex; flex-direction: column; gap: 20px; }

  .docks { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .demo { display: flex; flex-direction: column; gap: 8px; }
  .demo-cap { font-size: 12px; font-weight: 700; color: var(--color-text-muted); letter-spacing: .03em; }
  .demo-dock { border-radius: var(--radius-2xl); overflow: hidden; box-shadow: var(--shadow-sm); }

  .summary { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pill { display: inline-flex; align-items: baseline; gap: 6px; padding: 6px 12px; border-radius: var(--radius-full); background: var(--color-surface); box-shadow: var(--shadow-sm); font-size: 12px; font-weight: 700; color: var(--color-text); }
  .pill b { font-family: var(--font-display); font-size: 15px; }
  .pill.total { background: var(--color-gravity); color: var(--color-text-invert); }

  .group { background: var(--color-surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); padding: 16px 18px; }
  .group-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .group-head h3 { margin: 0; font-family: var(--font-display); font-size: var(--text-body); color: var(--color-text); }
  .group-head .count { font-size: 12px; font-weight: 700; color: var(--color-text-muted); }
  .group-head .note { margin-left: auto; font-size: 11px; color: var(--color-text-muted); text-align: right; max-width: 60%; }

  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cell-box { width: 100%; aspect-ratio: 1; background: var(--color-bg); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
  .tile .nm { font-size: 11px; font-weight: 700; color: var(--color-text-muted); text-align: center; line-height: 1.2; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.GravityJellyDesignSystem_3e0487;
    const { Tray, TrayPiece } = NS;

    // ---- Piece catalog by group (cells = [row, col]) ----
    const GROUPS = [
      {
        title: '1 · Khối thẳng — Thanh dọc & ngang', color: 'blue', note: '1 đến 5 ô · 9 hướng',
        items: [
          { nm: '1×1', cells: [[0,0]] },
          { nm: '1×2', cells: [[0,0],[0,1]] },
          { nm: '2×1', cells: [[0,0],[1,0]] },
          { nm: '1×3', cells: [[0,0],[0,1],[0,2]] },
          { nm: '3×1', cells: [[0,0],[1,0],[2,0]] },
          { nm: '1×4', cells: [[0,0],[0,1],[0,2],[0,3]] },
          { nm: '4×1', cells: [[0,0],[1,0],[2,0],[3,0]] },
          { nm: '1×5', cells: [[0,0],[0,1],[0,2],[0,3],[0,4]] },
          { nm: '5×1', cells: [[0,0],[1,0],[2,0],[3,0],[4,0]] },
        ],
      },
      {
        title: '2 · Khối vuông — Square', color: 'pink', note: '3×3 chiếm trọn 1 vùng Sudoku',
        items: [
          { nm: 'Vuông 2×2', cells: [[0,0],[0,1],[1,0],[1,1]] },
          { nm: 'Vuông 3×3', cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]] },
        ],
      },
      {
        title: '3 · Khối L & J — Móc câu', color: 'yellow', note: 'mỗi loại 4 hướng quay',
        items: [
          { nm: 'L nhỏ · 3 ô', cells: [[0,0],[1,0],[1,1]] },
          { nm: 'L · 4 ô', cells: [[0,0],[1,0],[2,0],[2,1]] },
          { nm: 'J · 4 ô', cells: [[0,1],[1,1],[2,1],[2,0]] },
          { nm: 'L lớn · 5 ô', cells: [[0,0],[1,0],[2,0],[2,1],[2,2]] },
        ],
      },
      {
        title: '4 · Khối chữ T', color: 'mint', note: 'mỗi loại 4 hướng quay',
        items: [
          { nm: 'T nhỏ · 4 ô', cells: [[0,0],[0,1],[0,2],[1,1]] },
          { nm: 'T lớn · 5 ô', cells: [[0,0],[0,1],[0,2],[1,1],[2,1]] },
        ],
      },
      {
        title: '5 · Khối zíc-zắc — S & Z', color: 'blue', note: 'mỗi loại 2 hướng quay',
        items: [
          { nm: 'Z · 4 ô', cells: [[0,0],[0,1],[1,1],[1,2]] },
          { nm: 'S · 4 ô', cells: [[0,1],[0,2],[1,0],[1,1]] },
        ],
      },
      {
        title: '6 · Khối gập khúc đặc biệt', color: 'pink', note: 'biến thể nâng cao',
        items: [
          { nm: 'Bậc thang · 3 ô', cells: [[0,0],[1,0],[1,1]] },
          { nm: 'Chữ U · 5 ô', cells: [[0,0],[0,2],[1,0],[1,1],[1,2]] },
          { nm: 'Chữ thập · 5 ô', cells: [[0,1],[1,0],[1,1],[1,2],[2,1]] },
          { nm: 'Chéo · 2 ô', cells: [[0,0],[1,1]] },
          { nm: 'Chéo · 3 ô', cells: [[0,0],[1,1],[2,2]] },
        ],
      },
    ];
    const TOTAL = GROUPS.reduce((s, g) => s + g.items.length, 0);

    function Tile({ p, color }) {
      return (
        <div className="tile">
          <div className="cell-box">
            <TrayPiece piece={{ cells: p.cells, color }} fit={70} maxCell={18} />
          </div>
          <div className="nm">{p.nm}</div>
        </div>
      );
    }

    function Group({ g }) {
      return (
        <div className="group">
          <div className="group-head">
            <h3>{g.title}</h3>
            <span className="count">{g.items.length} loại</span>
            {g.note && <span className="note">{g.note}</span>}
          </div>
          <div className="grid">{g.items.map((p, i) => <Tile key={p.nm + i} p={p} color={g.color} />)}</div>
        </div>
      );
    }

    // Two live docks proving uniform sizing adapts: small pieces → bigger cells,
    // big pieces (5-bar, 3×3) → uniformly smaller cells, never jarring.
    const smallDock = [
      { cells: [[0,0]], color: 'yellow' },
      { cells: [[0,0],[1,0],[1,1]], color: 'mint' },
      { cells: [[0,0],[0,1],[1,0],[1,1]], color: 'pink' },
    ];
    const bigDock = [
      { cells: [[0,0],[1,0],[2,0],[3,0],[4,0]], color: 'blue' },
      { cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]], color: 'pink' },
      { cells: [[0,0],[0,1],[0,2],[1,1],[2,1]], color: 'yellow' },
    ];

    ReactDOM.createRoot(document.getElementById('root')).render(
      <div className="wrap">
        <div className="docks">
          <div className="demo">
            <div className="demo-cap">DOCK · mảnh nhỏ → cell to (ô slot rộng rãi)</div>
            <div className="demo-dock"><Tray pieces={smallDock} selectedIndex={2} /></div>
          </div>
          <div className="demo">
            <div className="demo-cap">DOCK · mảnh lớn (5×1, 3×3) → cell nhỏ đồng đều</div>
            <div className="demo-dock"><Tray pieces={bigDock} selectedIndex={1} /></div>
          </div>
        </div>

        <div className="summary">
          <span className="pill total"><b>{TOTAL}</b> loại khối</span>
          {GROUPS.map((g, i) => (
            <span className="pill" key={i}><b>{g.items.length}</b> {g.title.split('—')[0].replace(/^\d+ · /, '').trim()}</span>
          ))}
        </div>

        {GROUPS.map((g, i) => <Group key={i} g={g} />)}
      </div>
    );
  </script>
</body>
</html>
