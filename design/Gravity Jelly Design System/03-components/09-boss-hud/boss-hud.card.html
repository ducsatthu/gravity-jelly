<!-- @dsCard group="Components" viewport="1180x900" name="BossHud" subtitle="Cụm boss Gravity Jelly — mỗi boss có silhouette riêng, jelly CHỈ CÓ MẮT. BossCard compact (mascot tràn trái) · Intro Card lớn · Warning Toast. 3 boss: Chú Sâu Đồng Cỏ · Kẻ Đổ Rác · Thần Thác." -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-body); background: var(--color-bg); }
  #root { min-height: 100vh; padding: 36px 32px; box-sizing: border-box;
          display: flex; gap: 40px; align-items: flex-start; justify-content: center; }
  .col { display: flex; flex-direction: column; }
  .hubw { width: 360px; }
  .introw { width: 344px; }
  .sub { font-family: var(--font-body); font-weight: 800; font-size: 11px;
         letter-spacing: 0.06em; color: #B7A489; text-transform: uppercase;
         margin: 0 0 14px 2px; }
  .cardgap { display: flex; flex-direction: column; gap: 26px; }
  .toastrow { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; align-items: flex-start; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { BossCard, BossIntroCard, BossToast, BossRule } = window.GravityJellyDesignSystem_3e0487;

    const BOSSES = [
      { kind: 'worm', level: 10, name: 'Chú Sâu Đồng Cỏ', shield: { current: 4, target: 5 },
        chip: { kind: 'x2', tone: 'rule', role: 'rule', label: 'Combo ×2' } },
      { kind: 'trash', level: 20, name: 'Thần Rừng', shield: { current: 6, target: 8 },
        chip: { kind: 'leaf', tone: 'trash', role: 'tell', label: 'Sắp đổ rác' } },
      { kind: 'water', level: 30, name: 'Thần Thác', shield: { current: 7, target: 10 },
        chip: { kind: 'gravity', tone: 'gravity', role: 'tell', label: 'Đảo trọng lực' } },
    ];

    function App() {
      return (
        <>
          {/* Pre-boss hub — the 3 compact boss cards */}
          <div className="col hubw">
            <div className="sub">Boss Hub · card compact (in-game / pre-boss)</div>
            <div className="cardgap">
              {BOSSES.map((b, i) => (
                <BossCard key={i} kind={b.kind} level={b.level} name={b.name} shield={b.shield} chip={b.chip} />
              ))}
            </div>
          </div>

          {/* Large intro card + two INDEPENDENT parts: warnings vs guide */}
          <div className="col introw">
            <div className="sub">Intro Card lớn · trước màn boss</div>
            <BossIntroCard kind="water" level={30} name="Thần Thác" shield={{ current: 7, target: 10 }}
              rule={{ kind: 'gravity', tone: 'gravity', role: 'tell', label: 'Sau 2 lượt: Đảo trọng lực' }} />

            <div className="sub" style={{ marginTop: 30 }}>Cảnh báo · boss sắp ra chiêu</div>
            <div className="toastrow" style={{ marginTop: 0 }}>
              <BossToast kind="trash" tone="trash" label="Lượt sau: Đổ rác" />
              <BossToast kind="gravity" tone="gravity" label="Sau 2 lượt: Đảo trọng lực" />
            </div>

            <div className="sub" style={{ marginTop: 30 }}>Cẩm nang · cách phá khiên</div>
            <div className="toastrow" style={{ marginTop: 0 }}>
              <BossRule icon="x2" label="Combo ×2 phá khiên" />
              <BossRule icon="shield" label="Khiên vỡ dần mỗi combo" />
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
