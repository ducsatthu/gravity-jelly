<!-- @dsCard group="Components" viewport="880x760" name="BossHud" subtitle="Cụm HUD boss trên cùng màn GAME — chân dung + thanh máu (giật/nháy khi trúng) + số sát thương theo combo + nhắc luật. 3 boss, nền tối/sáng" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-body); }
  /* prove readability on both: cream meadow (top) → dark biome (bottom) */
  #root { min-height: 100vh; padding: 26px 22px; box-sizing: border-box;
          background: linear-gradient(180deg, #FFF7EC 0%, #F4E9D8 32%, #4B3E7A 66%, #241C4A 100%);
          display: flex; flex-direction: column; gap: 22px; align-items: center; }
  .row { width: 392px; display: flex; flex-direction: column; gap: 7px; }
  .cap { font-family: var(--font-body); font-weight: 800; font-size: 12px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { BossHud } = window.GravityJellyDesignSystem_3e0487;
    const { useState, useEffect, useRef } = React;
    // comboDamage is a lowercase module export → not on the DS namespace; inline it.
    const comboDamage = (c) => (c >= 7 ? 3 : c >= 4 ? 2 : c >= 2 ? 1 : 0);

    // Each demo boss auto-takes a hit on a loop so the jerk/flash + damage float
    // are visible. HP ticks down by the combo damage, wraps back to full.
    function DemoBoss({ boss }) {
      const [hp, setHp] = useState(boss.maxHp);
      const [token, setToken] = useState(0);
      const [hit, setHit] = useState({ damage: 1, combo: 2 });
      const combos = boss.combos;
      const iRef = useRef(0);
      useEffect(() => {
        const id = setInterval(() => {
          const combo = combos[iRef.current % combos.length];
          iRef.current++;
          const dmg = comboDamage(combo);
          setHit({ damage: dmg, combo });
          setToken((t) => t + 1);
          setHp((h) => (h - dmg <= 0 ? boss.maxHp : h - dmg));
        }, 1700);
        return () => clearInterval(id);
      }, []);
      return (
        <div className="row">
          <div className="cap" style={{ color: boss.capDark ? 'rgba(255,255,255,0.85)' : '#7A6650' }}>{boss.cap}</div>
          <BossHud level={boss.level} name={boss.name} hp={hp} maxHp={boss.maxHp}
                   color={boss.color} edge={boss.edge} shine={boss.shine}
                   hitToken={token} lastHit={hit} tell={boss.tell} />
        </div>
      );
    }

    const BOSSES = [
      { cap: '(a) L10 · Chú Sâu Đồng Cỏ — máu 5 · nền sáng', level: 10, name: 'Chú Sâu Đồng Cỏ', maxHp: 5,
        color: '#6FCF7F', edge: '#4FA95F', shine: '#B7ECC0', combos: [2, 3, 2], tell: null },
      { cap: '(b) L20 · Kẻ Đổ Rác — máu 8 · tell "sắp đổ rác"', level: 20, name: 'Kẻ Đổ Rác', maxHp: 8,
        color: '#C9A86A', edge: '#A2814A', shine: '#E6CE9E', combos: [4, 3, 5], tell: { kind: 'trash' } },
      { cap: '(c) L30 · Thần Thác — máu 10 · tell "đảo trọng lực 3→0" · nền tối', level: 30, name: 'Thần Thác', maxHp: 10,
        color: '#7E9CE8', edge: '#5C79C4', shine: '#B8CCF5', capDark: true, combos: [7, 8, 5], tell: { kind: 'gravity', countdown: 2 } },
    ];

    ReactDOM.createRoot(document.getElementById('root')).render(
      <>{BOSSES.map((b, i) => <DemoBoss key={i} boss={b} />)}</>
    );
  </script>
</body>
</html>
