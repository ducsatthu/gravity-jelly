<!-- @dsCard group="Foundations" viewport="700x230" name="Jelly Block" subtitle="4 flavors, each with a cute sticker · stone · states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-body);
    color: var(--color-text);
    padding: 24px;
  }
  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cap { font-size: 12px; color: var(--color-text-muted); font-weight: 700; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { JellyBlock } = window.GravityJellyDesignSystem_3e0487;
    const Item = ({ label, children }) => (
      <div className="item">{children}<div className="cap">{label}</div></div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(
      <div className="row">
        <Item label="yellow · star"><JellyBlock color="yellow" size={56} /></Item>
        <Item label="mint · leaf"><JellyBlock color="mint" size={56} /></Item>
        <Item label="pink · heart"><JellyBlock color="pink" size={56} /></Item>
        <Item label="blue · droplet"><JellyBlock color="blue" size={56} /></Item>
        <Item label="stone (fixed)"><JellyBlock color="stone" size={56} /></Item>
        <Item label="squashed"><JellyBlock color="mint" size={56} squashed /></Item>
      </div>
    );
  </script>
</body>
</html>
