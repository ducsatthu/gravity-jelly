<!-- @dsCard group="Foundations" viewport="700x340" name="Eyes" subtitle="Gravity tracking + happy / focus / smug expressions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-body);
    color: var(--color-text);
    padding: 24px;
  }
  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .grid { display: flex; flex-direction: column; gap: 26px; }
  .sect { font-size: 11px; font-weight: 800; color: var(--color-text-muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .cap { font-size: 12px; color: var(--color-text-muted); font-weight: 700; }
  .host {
    width: 84px; height: 84px; border-radius: 24px;
    background: var(--color-block-yellow);
    border: 3px solid var(--color-block-yellow-edge);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Eyes } = window.GravityJellyDesignSystem_3e0487;
    const Host = ({ children }) => <div className="host">{children}</div>;
    const dirs = ['down','up','left','right'];
    const exprs = [
      { e: 'happy', cap: 'happy · falling' },
      { e: 'focus', cap: 'focus · on player' },
      { e: 'smug',  cap: 'smug · squint' },
      { e: 'normal', cap: 'normal' },
    ];
    ReactDOM.createRoot(document.getElementById('root')).render(
      <div className="grid">
        <div>
          <div className="sect">Gravity tracking</div>
          <div className="row">{dirs.map(d => (
            <div className="item" key={d}><Host><Eyes direction={d} blockSize={84} /></Host><div className="cap">{d}</div></div>
          ))}</div>
        </div>
        <div>
          <div className="sect">Expressions</div>
          <div className="row">{exprs.map(x => (
            <div className="item" key={x.e}><Host><Eyes expression={x.e} blockSize={84} /></Host><div className="cap">{x.cap}</div></div>
          ))}</div>
        </div>
      </div>
    );
  </script>
</body>
</html>
